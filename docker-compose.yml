services:

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=mbo_portal_v2
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=devon
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mbo_portal_v2"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  backend:
    build: ./mbo_youth_emp
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./mbo_youth_emp/.env
    environment:
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0

  celery_worker:
    build: ./mbo_youth_emp
    command: celery -A config worker -l INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./mbo_youth_emp/.env
    environment:
      - DB_HOST=db
      - CELERY_BROKER_URL=redis://redis:6379/0

  frontend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend

volumes:
  postgres_data:
